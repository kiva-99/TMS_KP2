upstream quote_backend {
    server app1:5000;
    server app2:5000;
}

server {
    listen 5000;

    location / {
        proxy_pass http://quote_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://quote_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
